# ═══════════════════════════════════════════════════════════════
# D-Secure NATS Server — Render Deployment
# ═══════════════════════════════════════════════════════════════
# 
# Architecture:
#   Admin App ←→ NATS (WebSocket) ←→ Endpoint App
#   No backend needed. Apps connect directly via wss://
#
# Render exposes ONE port. We use it for WebSocket.
# Internal NATS TCP (4222) stays internal-only.
# ═══════════════════════════════════════════════════════════════

server_name: dsecure-nats

# ── Internal NATS Protocol (not publicly exposed on Render) ──
port: 4222

# ── WebSocket (PUBLIC — Render exposes this port) ──
websocket {
  # $NATS_WS_PORT is substituted at runtime by start.sh
  # Render assigns PORT env var (usually 10000)
  port: NATS_WS_PORT_PLACEHOLDER
  no_tls: true           # Render handles TLS termination (wss:// → ws://)
  compression: true

  # CORS — allow all origins for Flutter desktop + web clients
  same_origin: false
  allowed_origins: ["*"]
}

# ── JetStream (Message Persistence) ──
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 1GB
}

# ── Authentication (Simple Token) ──
authorization {
  # $NATS_AUTH_TOKEN is substituted at runtime by start.sh
  token: NATS_AUTH_TOKEN_PLACEHOLDER
  timeout: 10
}

# ── Connection Limits ──
max_connections: 1000
max_payload: 1048576      # 1MB max message size
max_pending: 16777216     # 16MB pending per connection

# ── Timeouts & Keepalive ──
ping_interval: 20s
ping_max: 3
write_deadline: 10s

# ── Logging ──
logtime: true
debug: false
trace: false

# ── Monitoring (internal only, not exposed on Render) ──
http_port: 8222
