# ═══════════════════════════════════════════════════════════
# D-Secure NATS Server — Render Blueprint
# ═══════════════════════════════════════════════════════════

services:
  - type: web
    name: dsecure-nats
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    
    # Health check (monitoring endpoint)
    healthCheckPath: /healthz
    
    # Environment variables
    envVars:
      # Auth token — both apps use this to connect
      - key: NATS_AUTH_TOKEN
        value: dsecure_dev_token_2024
      
    # Persistent disk for JetStream message storage
    disk:
      name: jetstream-data
      mountPath: /data/jetstream
      sizeGB: 1
    
    # Single instance
    numInstances: 1
    
    # Plan
    plan: starter
    
    # Region
    region: oregon
    
    # Auto-deploy on push
    autoDeploy: true
